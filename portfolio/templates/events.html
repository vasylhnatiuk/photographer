{% extends "base.html" %}
{% load static %}

{% block title %}Events{% endblock %}

{% block content %}

<!-- HERO -->
<section class="relative w-full h-[40vh] md:h-[55vh] overflow-hidden">

  <img src="{% static 'images/e2.jpg' %}"
       class="absolute inset-0 w-full h-full object-cover">

  <div class="absolute inset-0 bg-black/60"></div>

  <div class="relative z-10 h-full flex flex-col items-center justify-center text-center px-6">

    <h1 class="text-white font-light text-3xl md:text-5xl">
      Events
    </h1>

    <p class="text-white/70 mt-3 text-sm md:text-lg">
      Moments • Atmosphere • Stories
    </p>

  </div>

</section>


<!-- ════════════════════════════════
     EDITORIAL FLOW
════════════════════════════════ -->
<section class="max-w-6xl mx-auto px-4 py-16 space-y-12">

  <!-- BIG 1 (e1) -->
  <div onclick="openLightbox(0)" class="cursor-pointer overflow-hidden group relative">

    <img src="{% static 'images/e1.jpg' %}"
         class="h-[650px] w-full object-cover group-hover:scale-105 transition duration-700">

    <div class="absolute bottom-10 left-10 text-white max-w-xl">
      <p class="text-xs tracking-[0.3em] uppercase text-white/60">
        Opening moment
      </p>
      <h2 class="text-3xl md:text-5xl font-light mt-3">
        The beginning of a story
      </h2>
    </div>

  </div>


  <!-- ROW 1 (e7 + e3) -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

    <div onclick="openLightbox(1)" class="cursor-pointer overflow-hidden group">
      <img src="{% static 'images/e7.jpg' %}"
           class="h-[450px] w-full object-cover group-hover:scale-105 transition duration-700">
    </div>

    <div onclick="openLightbox(2)" class="cursor-pointer overflow-hidden group">
      <img src="{% static 'images/e3.jpg' %}"
           class="h-[450px] w-full object-cover group-hover:scale-105 transition duration-700">
    </div>

  </div>


  <!-- BIG 2 (e4) -->
  <div onclick="openLightbox(3)" class="cursor-pointer overflow-hidden group relative">

    <img src="{% static 'images/e4.jpg' %}"
         class="h-[650px] w-full object-cover group-hover:scale-105 transition duration-700">

    <div class="absolute bottom-10 left-10 text-white max-w-xl">
      <p class="text-xs tracking-[0.3em] uppercase text-white/60">
        Emotional peak
      </p>
      <h2 class="text-3xl md:text-5xl font-light mt-3">
        Where emotions peak
      </h2>
    </div>

  </div>


  <!-- ROW 2 (e5 + e6) -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

    <div onclick="openLightbox(4)" class="cursor-pointer overflow-hidden group">
      <img src="{% static 'images/e5.jpg' %}"
           class="h-[450px] w-full object-cover group-hover:scale-105 transition duration-700">
    </div>

    <div onclick="openLightbox(5)" class="cursor-pointer overflow-hidden group">
      <img src="{% static 'images/e6.jpg' %}"
           class="h-[450px] w-full object-cover group-hover:scale-105 transition duration-700">
    </div>

  </div>

</section>


<!-- LIGHTBOX -->
<div id="lightbox"
     class="fixed inset-0 bg-black/95 hidden z-50 flex items-center justify-center">

  <img id="lightbox-img"
       class="max-w-[92%] max-h-[85%] object-contain">

  <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white text-2xl">✕</button>
  <button onclick="prevImage()" class="absolute left-6 text-white text-4xl">‹</button>
  <button onclick="nextImage()" class="absolute right-6 text-white text-4xl">›</button>

</div>


<!-- JS -->
<script>
const images = [
  "{% static 'images/e1.jpg' %}", // 0
  "{% static 'images/e7.jpg' %}", // 1
  "{% static 'images/e3.jpg' %}", // 2
  "{% static 'images/e4.jpg' %}", // 3
  "{% static 'images/e5.jpg' %}", // 4
  "{% static 'images/e6.jpg' %}"  // 5
];

let currentIndex = 0;

const lightbox = document.getElementById('lightbox');
const img = document.getElementById('lightbox-img');

function openLightbox(i) {
  currentIndex = i;
  img.src = images[i];
  lightbox.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.add('hidden');
  document.body.style.overflow = '';
}

function show(i) {
  if (i < 0) i = images.length - 1;
  if (i >= images.length) i = 0;
  currentIndex = i;
  img.src = images[i];
}

function nextImage() { show(currentIndex + 1); }
function prevImage() { show(currentIndex - 1); }

document.addEventListener('keydown', (e) => {
  if (lightbox.classList.contains('hidden')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') nextImage();
  if (e.key === 'ArrowLeft') prevImage();
});

lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) closeLightbox();
});
</script>

{% endblock %}
