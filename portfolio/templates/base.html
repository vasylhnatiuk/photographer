<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}Photographer{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Libre Baskerville', serif;
      font-size: 18px;
      line-height: 1.8;
      background: #fff;
      color: #111;
    }

    /* 🔥 mobile readability */
    @media (max-width: 768px) {
      body {
        font-size: 19px;
        line-height: 1.9;
      }
    }

    .logo-font {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 2px;
      color: white;
    }

    #site-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 50;
      background: transparent;
      transition: background 0.25s ease;
    }

    .scrolled {
      background: rgba(0, 0, 0, 0.85);
    }

    #site-header a,
    #site-header button {
      color: white;
      font-size: 18px;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header id="site-header" class="px-6 py-5 flex justify-between items-center">

  <h1 class="logo-font">Vasyl Hnatiuk</h1>

  <nav class="hidden md:flex space-x-10">
    <a href="/">Home</a>
    <a href="/gallery/">Gallery</a>
    <a href="/albums/">Albums</a>
    <a href="/booking/">Booking</a>
    <a href="/about/">About</a>
  </nav>

  <button id="menu-btn" class="md:hidden text-3xl">☰</button>

</header>

{% block hero %}{% endblock %}

<!-- MOBILE MENU -->
<div id="mobile-menu"
     class="hidden md:hidden flex flex-col space-y-5 px-6 py-5 bg-black text-white text-lg">

  <a href="/">Home</a>
  <a href="/gallery/">Gallery</a>
  <a href="/albums/">Albums</a>
  <a href="/booking/">Booking</a>
  <a href="/about/">About</a>

</div>

<!-- CONTENT -->
<main class="pt-0">
  {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="border-t border-black/10 py-14 text-center text-gray-500 text-sm">
  <p>© 2026 Vasyl Hnatiuk</p>
</footer>

<script>
  const header = document.getElementById('site-header');
  const btn = document.getElementById('menu-btn');
  const menu = document.getElementById('mobile-menu');

  btn.addEventListener('click', () => {
    menu.classList.toggle('hidden');
  });

  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 20);
  });
</script>

</body>
</html>
