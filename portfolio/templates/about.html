<!DOCTYPE html>
<html>
<head>
  <title>Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

  <div class="max-w-6xl mx-auto py-10 px-4">

    <h1 class="text-4xl mb-10">Gallery</h1>

    <div class="grid md:grid-cols-3 gap-4">
      {% for photo in photos %}
        <img src="{{ photo.image.url }}"
             class="rounded-xl hover:scale-105 transition duration-300">
      {% endfor %}
    </div>

  </div>

</body>
</html>
